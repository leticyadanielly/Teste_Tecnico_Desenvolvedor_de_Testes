name: .NET Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Build solution
        run: dotnet build --no-restore --configuration Release

      - name: Run Unit Tests
        run: dotnet test MinhasFinancas.UnitTests/MinhasFinancas.UnitTests.csproj --no-build --verbosity normal

      - name: Run Integration Tests
        run: dotnet test MinhasFinancas.IntegrationTests/MinhasFinancas.IntegrationTests.csproj --no-build --verbosity normal

      - name: Run E2E Tests
        run: dotnet test MinhasFinancas.E2ETests/MinhasFinancas.E2ETests.csproj --no-build --verbosity normal
      
